spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 60000
      connection-timeout: 20000
      max-lifetime: 1800000
  mail:
    host: smtp.hostinger.com
    port: 465
    username: no-reply@learneyjourney.com
    password: ${SPRING_EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
logging:
  level:
    root: info
stripe:
  secret-key: ${STRIPE_SECRET_KEY}
  publish-key: ${STRIPE_PUBLISHABLE_KEY}
  success-url: "https://learneyjourney.com/payment/success"
  cancel-url: "https://learneyjourney.com/payment/cancel"
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}
  apiBase: "https://api.stripe.com"
  identity:
    return-url: http://localhost:5173/tutor/verification-return
  connect:
    refresh-url: http://localhost:5173/tutor/connect/refresh
    return-url: http://localhost:5173/tutor/connect/return
gcs:
  bucket: learney-media-dev
app:
  baseUrl: "https://learney-frontend-dev-24285490035.asia-southeast1.run.app"
  backendUrl: "https://learney-journey-24285490035.asia-southeast1.run.app"
  allow-origins: "https://learneyjourney.com,https://www.learneyjourney.com,http://localhost:5173, https://learney-frontend-dev-24285490035.asia-southeast1.run.app"
  require-basic-auth: true
openai:
  base-url: https://api.openai.com
  api-key: ${OPENAI_API_KEY}
  model: gpt-4o